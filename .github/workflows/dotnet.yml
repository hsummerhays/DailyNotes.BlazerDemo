name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
    - uses: actions/checkout@v4
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish API
      run: dotnet publish DailyNotes.Api/DailyNotes.Api.csproj -c Release -o ./publish-api

    - name: Zip API
      run: (cd ./publish-api && zip -r ../api.zip .)

    - name: Deploy API to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'app-dn-api-hsh8'
        package: api.zip

    - name: Publish Blazor
      run: dotnet publish DailyNotes.Blazor/DailyNotes.Blazor.csproj -c Release -o ./publish-blazor

    - name: Zip Blazor
      run: (cd ./publish-blazor && zip -r ../blazor.zip .)

    - name: Deploy Blazor to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'app-dn-blazor-hsh8'
        package: blazor.zip

